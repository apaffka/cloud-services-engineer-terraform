name: Kittygram Deploy

on:
  workflow_dispatch:

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: kittygram
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0 flake8-isort==6.0.0
          pip install -r backend/requirements.txt

      - name: Lint backend with flake8
        run: |
          python -m flake8 backend/ --exclude migrations,__pycache__,.venv,venv,backend/kittygram_backend/settings.py

      - name: Run backend tests
        env:
          SECRET_KEY: ci-secret
          DEBUG: 'False'
          DB_ENGINE: django.db.backends.postgresql
          POSTGRES_DB: kittygram
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: '5432'
        run: |
          cd backend
          python manage.py test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: 'true'
        run: npm test -- --watchAll=false

  push_docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    name: Deploy to Yandex Cloud VM
    runs-on: ubuntu-latest
    needs: push_docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Wait for Docker on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script: |
            set -e
            echo "Waiting for cloud-init..."
            sudo cloud-init status --wait
            echo "Checking Docker..."
            docker --version
            sudo docker compose version
      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          source: docker-compose.production.yml
          target: /home/${{ secrets.USER }}/kittygram

      - name: Run deployment on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script: |
            set -e
            mkdir -p /home/${{ secrets.USER }}/kittygram
            cd /home/${{ secrets.USER }}/kittygram

            cat > .env <<EOF_ENV
            DOCKERHUB_USERNAME=${{ secrets.DOCKER_USERNAME }}
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            DEBUG=False
            ALLOWED_HOSTS=${{ secrets.HOST }},localhost,127.0.0.1,backend,gateway
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DB_HOST=postgres
            DB_PORT=5432
            EOF_ENV

            sudo docker compose -f docker-compose.production.yml pull
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d
            sudo docker compose -f docker-compose.production.yml ps

  auto_tests:
    name: Autotests after deploy
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install autotest dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests PyYAML

      - name: Run autotests
        run: pytest -q tests

  telegram_notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    needs: auto_tests
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_USER }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Kittygram deployed successfully
            👤 Actor: ${{ github.actor }}
            🌿 Branch: ${{ github.ref_name }}
            🔗 Commit URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            🌐 URL: http://${{ secrets.HOST }}:8080
